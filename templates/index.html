<!DOCTYPE html>
<html>
<head>
    <title>Receipt Generator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #f3f4f6;
        }

        .wrapper {
            display: flex;
            height: 100vh;
        }

        .form-section {
            width: 40%;
            background: #ffffff;
            padding: 40px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        h2 {
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: 600;
        }

        .field {
            position: relative;
            margin-bottom: 20px;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 14px 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            font-size: 14px;
            outline: none;
        }

        label {
            font-size: 12px;
            color: #6b7280;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .preview-section {
            width: 60%;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .receipt {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .receipt h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        .receipt p {
            margin: 8px 0;
            font-size: 14px;
        }

        .bold {
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .wrapper {
                flex-direction: column;
            }

            .form-section,
            .preview-section {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- FORM -->
    <div class="form-section">
        <h2>Generate Receipt</h2>

        <form action="/generate" method="POST">

            <div class="field">
                <label>Name</label>
                <input type="text" name="name" oninput="updatePreview()" required>
            </div>

            <div class="field">
                <label>Reg No</label>
                <input type="text" name="reg" oninput="updatePreview()" required>
            </div>

            <div class="field">
                <label>UTR</label>
                <input type="text" name="utr" oninput="updatePreview()" required>
            </div>

            <div class="field">
                <label>Payment</label>
                <input type="text" name="payment" oninput="updatePreview()" required>
            </div>

            <div class="field">
                <label>Plan</label>
                <select name="plan" onchange="updatePreview()" required>
                    <option>Diet Only Plan</option>
                    <option>Diet and Recorded Workout Plan</option>
                    <option>Diet and Group Live Workout Plan</option>
                    <option>Diet and Personal Workout Plan</option>
                    <option>Recorded Workout Plan</option>
                    <option>Group Live Workout Plan</option>
                    <option>Personal Workout Plan</option>
                </select>
            </div>

            <div class="field">
                <label>Start Date</label>
                <input type="date" name="start" onchange="updatePreview()" required>
            </div>

            <div class="field">
                <label>Duration</label>
                <select name="duration" onchange="updatePreview()" required>
                    <option value="30">1 Month</option>
                    <option value="60">2 Months</option>
                    <option value="90">3 Months</option>
                    <option value="120">4 Months</option>
                    <option value="150">5 Months</option>
                    <option value="180">6 Months</option>
                </select>
            </div>

            <button type="submit">Generate PDF</button>

        </form>
    </div>

    <!-- PREVIEW -->
    <div class="preview-section">
        <div class="receipt">
            <h3>Receipt Preview</h3>

            <p><span class="bold">Name:</span> <span id="p_name">-</span></p>
            <p><span class="bold">Reg:</span> <span id="p_reg">-</span></p>
            <p><span class="bold">UTR:</span> <span id="p_utr">-</span></p>
            <p><span class="bold">Amount:</span> ₹<span id="p_payment">-</span></p>
            <p><span class="bold">Plan:</span> <span id="p_plan">-</span></p>
            <p><span class="bold">Start:</span> <span id="p_start">-</span></p>
            <p><span class="bold">Duration:</span> <span id="p_duration">-</span></p>

        </div>
    </div>

</div>

<script>
function updatePreview() {

    let name = document.querySelector('[name="name"]').value;
    let reg = document.querySelector('[name="reg"]').value;
    let utr = document.querySelector('[name="utr"]').value;
    let payment = document.querySelector('[name="payment"]').value;
    let plan = document.querySelector('[name="plan"]').value;
    let start = document.querySelector('[name="start"]').value;
    let duration = document.querySelector('[name="duration"]').value;

    document.getElementById("p_name").innerText = name || "-";
    document.getElementById("p_reg").innerText = reg || "-";
    document.getElementById("p_utr").innerText = utr || "-";
    document.getElementById("p_payment").innerText = payment || "-";
    document.getElementById("p_plan").innerText = plan || "-";
    document.getElementById("p_start").innerText = start || "-";

    let text = "-";
    if (duration == "30") text = "1 Month";
    if (duration == "60") text = "2 Months";
    if (duration == "90") text = "3 Months";
    if (duration == "120") text = "4 Months";
    if (duration == "150") text = "5 Months";
    if (duration == "180") text = "6 Months";

    document.getElementById("p_duration").innerText = text;
}
</script>

</body>
</html>
